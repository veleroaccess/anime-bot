<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎌 لوحة تحكم بوت الأنمي</title>
<link rel="stylesheet" href="/css/admin.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

<div class="app-layout">

<!-- ============= SIDEBAR ============= -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-icon">🎌</div>
    <div>
      <h2>بوت الأنمي</h2>
      <p>لوحة التحكم</p>
    </div>
  </div>
  
  <nav class="sidebar-nav">
    <div class="nav-section">
      <div class="nav-section-label">الرئيسية</div>
      <a class="nav-item active" onclick="showPage('dashboard')" href="#">
        <span class="nav-icon">📊</span> الإحصائيات
      </a>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-label">المحتوى</div>
      <a class="nav-item" onclick="showPage('categories')" href="#">
        <span class="nav-icon">📂</span> التصنيفات
      </a>
      <a class="nav-item" onclick="showPage('content')" href="#">
        <span class="nav-icon">🎬</span> الأفلام والمسلسلات
      </a>
      <a class="nav-item" onclick="showPage('episodes')" href="#">
        <span class="nav-icon">📺</span> الحلقات
      </a>
      <a class="nav-item" onclick="showPage('links')" href="#">
        <span class="nav-icon">🔗</span> روابط التحميل
      </a>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-label">المستخدمين</div>
      <a class="nav-item" onclick="showPage('users')" href="#">
        <span class="nav-icon">👥</span> المستخدمين
      </a>
      <a class="nav-item" onclick="showPage('broadcast')" href="#">
        <span class="nav-icon">📢</span> إرسال رسائل جماعية
      </a>
    </div>
    
    <div class="nav-section">
      <div class="nav-section-label">الأدوات</div>
      <a class="nav-item" onclick="showPage('shortener')" href="#">
        <span class="nav-icon">✂️</span> اختصار الروابط
      </a>
      <a class="nav-item" onclick="showPage('settings')" href="#">
        <span class="nav-icon">⚙️</span> الإعدادات
      </a>
    </div>
  </nav>
  
  <div class="sidebar-footer">
    <div class="bot-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">جاري التحقق...</span>
    </div>
  </div>
</aside>

<!-- ============= MOBILE OVERLAY ============= -->
<div class="overlay-mobile" id="mobileOverlay" onclick="closeSidebar()"></div>

<!-- ============= MAIN CONTENT ============= -->
<main class="main-content">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:12px;">
      <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
      <h1 class="topbar-title" id="pageTitle">📊 الإحصائيات</h1>
    </div>
    <div class="topbar-actions">
      <button class="btn btn-secondary btn-sm" onclick="setupWebhook()">🔗 تفعيل البوت</button>
      <button class="btn btn-primary btn-sm" onclick="refreshPage()">🔄 تحديث</button>
    </div>
  </div>
  
  <div class="page-content" id="pageContent">
    <div class="loading"><div class="spinner"></div> جاري التحميل...</div>
  </div>
</main>

</div>

<!-- ============= LOGIN MODAL ============= -->
<div class="modal-overlay open" id="loginModal">
  <div class="modal" style="max-width:400px;">
    <div class="modal-header">
      <h2 class="modal-title">🔐 تسجيل الدخول</h2>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="loginPassword" placeholder="أدخل كلمة مرور الادمن" onkeydown="if(event.key==='Enter') login()">
      </div>
      <button class="btn btn-primary" style="width:100%" onclick="login()">دخول →</button>
    </div>
  </div>
</div>

<!-- ============= DYNAMIC MODAL ============= -->
<div class="modal-overlay" id="dynamicModal">
  <div class="modal" id="dynamicModalContent">
  </div>
</div>

<!-- ============= TOAST CONTAINER ============= -->
<div class="toast-container" id="toastContainer"></div>

<script src="/js/admin.js"></script>
</body>
</html>
